<body data-page="public-home">

  <div class="cookie-notice" id="cookie-notice" aria-live="polite">
    <div class="cookie-notice__card">
      <p class="cookie-notice__text">
        Сайт использует технические cookie, localStorage и sessionStorage для входа в аккаунт и корректной работы сервиса.
        Подробнее:
        <a href="/legal/cookies">информация о cookie и локальном хранении данных</a>.
      </p>

        <button class="cookie-notice__button" id="cookie-notice-accept" type="button">Понятно</button>
      </div>
    </div>
  </div>
  <noscript>
    <section>
      <h1>BrotherShop, барбершоп в Братске</h1>
      <p>Барбершоп BrotherShop в Центральном районе Братска. Мужские стрижки, оформление бороды и запись онлайн.</p>
      <p>Адрес: улица Гагарина, 10, 1 этаж, Центральный район, Братск, Иркутская область, 665717.</p>
      <p>Телефон: +7 964 659-92-96</p>
      <p><a href="/legal/privacy">Политика обработки персональных данных</a></p>
    </section>
  </noscript>
  <script>
    (function () {
      const storageKey = "brothershop-cookie-notice-accepted";
      const notice = document.getElementById("cookie-notice");
      const acceptButton = document.getElementById("cookie-notice-accept");
      if (!notice || !acceptButton) return;
      try {
        if (window.localStorage && window.localStorage.getItem(storageKey) === "1") {
          return;
        }
      } catch {}
      notice.classList.add("is-visible");
      acceptButton.addEventListener("click", function () {
        try {
          if (window.localStorage) window.localStorage.setItem(storageKey, "1");
        } catch {}
        notice.classList.remove("is-visible");
      });
    })();
  </script>
  <script src="/client-app.js" defer></script>
